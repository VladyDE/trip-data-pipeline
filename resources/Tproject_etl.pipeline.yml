# The main pipeline for Tproject

resources:
  pipelines:
    Tproject_etl:
      name: Tproject_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/Tproject_etl"

      libraries:
        - glob:
            include: ../src/Tproject_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
